<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Indicator Tool</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="card">
        <h2>Password Strength Indicator Tool</h2>
        
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Type your password..." autocomplete="off">
            <button type="button" id="toggleVisibility">Show</button>
        </div>

        <div class="meter-container">
            <div id="strengthBar"></div>
        </div>
        
        <div class="status-text">
            Strength: <span id="strengthLabel" class="very-weak">Very Weak</span>
        </div>

        <div class="feedback-container">
            <h3>Security Insights</h3>
            <ul id="feedbackList">
                <li>Enter a password to start evaluation.</li>
            </ul>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
